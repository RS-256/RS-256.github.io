# ---- Web Tools ----
- id: dust-notifier-order-calc
  title: dustNotifierOrderCalc
  description: レッドストーンダストの更新通知順序を計算・可視化する Web ツール。座標から順序を求めるモードと、観測した順序から座標候補を逆算するモードを備える。
  details: Java Edition のレッドストーンダストが隣接ブロックへ通知する順序は、BlockPos のハッシュ値と HashSet の内部挙動によって座標ごとに決まります。このツールは、座標を入力して 7 方向の更新順序を等角投影で可視化する「Coord → Order」と、観測した順序から該当する座標候補を逆算する「Order → Coord」の 2 モードを搭載。仕組みの解説ドキュメントも公開しています。
  links:
    source: https://github.com/RS-256/dustNotifierOrderCalc
    site: https://rs256.net/dustNotifierOrderCalc/
  category: web-tools

- id: midi-to-litematic-converter
  title: midi-to-litematic-converter
  description: MIDI ファイルから音ブロックの配置を自動生成し、.litematic 形式で書き出すブラウザアプリ。ピアノロールでのプレビューに対応。
  details: MIDI ファイルを読み込んで音ブロックのレイアウトを自動生成し、Litematica で使える .litematic ファイルとして書き出すブラウザアプリ。トラック情報(ノート数・PPQ・テンポ)の表示、ピアノロールでのノートプレビュー、トラックごとの表示・エクスポート切り替え、メロディックトラックのベースノート設定、パーカッションの検出に対応。すべてクライアントサイドで動作します。
  links:
    source: https://github.com/RS-256/midi-to-litematic-converter
    site: https://rs256.net/midi-to-litematic-converter/
  category: web-tools

